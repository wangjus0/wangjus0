name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&bg_color=ffffff&title_color=000000&text_color=525252&icon_color=000000&ring_color=000000
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        env:
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "Update README cards"
          SHA=$(git rev-parse HEAD)
          sed -i "s|src=\"[^\"]*profile/stats.svg[^\"]*\"|src=\"https://raw.githubusercontent.com/${REPO}/main/profile/stats.svg?v=${SHA}\"|" README.md
          git add README.md
          git diff --staged --quiet || git commit -m "Bust stats image cache in README"
          git push
